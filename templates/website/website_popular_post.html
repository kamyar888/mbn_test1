{% load website_tags %} {% load static  %}
<div class="row">
      <div class="active-recent-blog-carusel">
        {% for post in posts %}
        <div class="single-recent-blog-post item">
          <div class="thumb">
            <img class="img-fluid" src="{{post.image.url}}" alt="" />
          </div>
          <div class="details">
            <div class="tags">
              <ul>
                {% for cat in post.category.all %}
                <li><a href="{% url 'category' cat.name %}">{{cat.name}}</a></li>
                {% endfor %}
              </ul>
            </div>
            <a href="{% url 'blog-single' pid=post.id %}"><h4 class="title">{{post.title}}</h4></a>
            <p>
              {{post.content|slice:100|truncatewords:10|safe}}
            </p>
            <h6 class="date">{{post.published_date}}</h6>
          </div>
        </div>
        {% endfor%}
      </div>
    </div>
