{% extends 'base.html' %} {% load static %} {% block content %}

<section class="relative about-banner">
  <div class="overlay overlay-bg"></div>
  <div class="container">
    <div class="row d-flex align-items-center justify-content-center">
      <div class="about-content col-lg-12">
        <h1 class="text-white">Contact Us</h1>
        <p class="text-white link-nav">
          <a href="{% url 'website:index' %}">Home</a>
          <span class="lnr lnr-arrow-right"></span>
          <a href="{% url 'website:contact' %}">Contact Us</a>
        </p>
      </div>
    </div>
  </div>
</section>

<section class="contact-page-area section-gap">
  <div class="container">
    <div class="row">
      <div
        class="map-wrap"
        style="width: 100%; height: 445px; margin-bottom: 30px"
      >
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d3239.123456789!2d51.315187!3d35.746625!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sus!4v1234567890"
          width="100%"
          height="445"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
        ></iframe>
      </div>

      <div class="col-lg-4 d-flex flex-column address-wrap">
        <div class="single-contact-address d-flex flex-row">
          <div class="icon">
            <span class="lnr lnr-home"></span>
          </div>
          <div class="contact-details">
            <h5>Binghamton, New York</h5>
            <p>4343 Hinkle Deegan Lake Road</p>
          </div>
        </div>
        <div class="single-contact-address d-flex flex-row">
          <div class="icon">
            <span class="lnr lnr-phone-handset"></span>
          </div>
          <div class="contact-details">
            <h5>00 (958) 9865 562</h5>
            <p>Mon to Fri 9am to 6 pm</p>
          </div>
        </div>
        <div class="single-contact-address d-flex flex-row">
          <div class="icon">
            <span class="lnr lnr-envelope"></span>
          </div>
          <div class="contact-details">
            <h5>support@colorlib.com</h5>
            <p>Send us your query anytime!</p>
          </div>
        </div>
      </div>

      <div class="col-lg-8">
        <form
          class="form-area contact-form text-right"
          action="{% url 'website:contact' %}"
          method="post"
          id="contactForm"
          novalidate
        >
          {% csrf_token %}

          <div class="row">
            <div class="col-lg-6 form-group">
              <input
                name="name"
                placeholder="Enter your name"
                onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter your name'"
                class="common-input mb-20 form-control"
                required=""
                type="text"
                id="id_name"
                value="{{ form.name.value|default:'' }}"
              />

              <input
                name="email"
                placeholder="Enter email address"
                pattern="[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{1,63}$"
                onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter email address'"
                class="common-input mb-20 form-control"
                required=""
                type="email"
                id="id_email"
                value="{{ form.email.value|default:'' }}"
              />

              <input
                name="subject"
                placeholder="Enter subject"
                onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter subject'"
                class="common-input mb-20 form-control"
                type="text"
                id="id_subject"
                value="{{ form.subject.value|default:'' }}"
              />
            </div>

            <div class="col-lg-6 form-group">
              <textarea
                class="common-textarea form-control"
                name="message"
                placeholder="Enter Message"
                onfocus="this.placeholder = ''"
                onblur="this.placeholder = 'Enter Message'"
                required=""
                id="id_message"
              >
{{ form.message.value|default:'' }}</textarea
              >
            </div>

            <div class="col-lg-12">
              <div class="alert-msg" style="text-align: left"></div>
              <button
                class="genric-btn primary"
                type="submit"
                style="float: right"
                id="submitBtn"
              >
                Send Message
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    // Show messages from server
    {% if messages %}
      {% for message in messages %}
        {% if message.tags == 'success' %}
          Swal.fire({
            icon: "success",
            title: "Success!",
            text: "{{ message|safe }}",
            confirmButtonText: "OK",
            confirmButtonColor: "#28a745",
            timer: 3000,
            timerProgressBar: true,
          });
        {% elif message.tags == 'error' %}
          Swal.fire({
            icon: "error",
            title: "Error!",
            text: "{{ message|safe }}",
            confirmButtonText: "Got it",
            confirmButtonColor: "#dc3545",
          });
        {% endif %}
      {% endfor %}
    {% endif %}

    // Client-side validation
    const form = document.getElementById("contactForm");
    const nameInput = document.getElementById("id_name");
    const emailInput = document.getElementById("id_email");
    const subjectInput = document.getElementById("id_subject");
    const messageInput = document.getElementById("id_message");

    function validateField(input) {
      if (input.hasAttribute("required") && input.value.trim() === "") {
        return false;
      }

      if (input.type === "email" && input.value.trim() !== "") {
        const emailPattern = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{1,63}$/;
        if (!emailPattern.test(input.value.trim())) {
          return false;
        }
      }

      return true;
    }

    function validateForm() {
      let isValid = true;

      if (!validateField(nameInput)) {
        isValid = false;
        nameInput.style.borderColor = "red";
        nameInput.style.borderWidth = "2px";
      } else {
        nameInput.style.borderColor = "";
        nameInput.style.borderWidth = "";
      }

      if (!validateField(emailInput)) {
        isValid = false;
        emailInput.style.borderColor = "red";
        emailInput.style.borderWidth = "2px";
      } else {
        emailInput.style.borderColor = "";
        emailInput.style.borderWidth = "";
      }

      if (!validateField(subjectInput)) {
        isValid = false;
        subjectInput.style.borderColor = "red";
        subjectInput.style.borderWidth = "2px";
      } else {
        subjectInput.style.borderColor = "";
        subjectInput.style.borderWidth = "";
      }

      if (!validateField(messageInput)) {
        isValid = false;
        messageInput.style.borderColor = "red";
        messageInput.style.borderWidth = "2px";
      } else {
        messageInput.style.borderColor = "";
        messageInput.style.borderWidth = "";
      }

      return isValid;
    }

    form.addEventListener("submit", function (e) {
      if (!validateForm()) {
        e.preventDefault();
        Swal.fire({
          icon: "error",
          title: "Error!",
          text: "Please fill all required fields correctly.",
          confirmButtonText: "Got it",
          confirmButtonColor: "#dc3545",
        });
      }
    });

    [nameInput, emailInput, subjectInput, messageInput].forEach((input) => {
      input.addEventListener("input", function () {
        if (validateField(this)) {
          this.style.borderColor = "";
          this.style.borderWidth = "";
        }
      });

      input.addEventListener("blur", function () {
        if (!validateField(this) && this.value.trim() !== "") {
          this.style.borderColor = "orange";
          this.style.borderWidth = "2px";
        } else if (validateField(this)) {
          this.style.borderColor = "green";
          this.style.borderWidth = "2px";
        }
      });
    });
  });
</script>

{% endblock %}
